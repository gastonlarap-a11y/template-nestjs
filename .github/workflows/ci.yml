name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # No `version:` input here on purpose: it's read from package.json's
      # `packageManager` field instead. Setting both makes the action fail
      # with "Multiple versions of pnpm specified" / ERR_PNPM_BAD_PM_VERSION.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `@prisma/client`'s generated types are required for tsc/build/tests to
      # resolve model types (e.g. `Prisma.UserWhereInput`) — no live database
      # connection is opened, but `prisma.config.ts` still requires
      # `DATABASE_URL` to be resolvable (it mirrors env/.env.<APP_ENV>, which
      # doesn't exist in CI), so a syntactically-valid placeholder is enough.
      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: 'sqlserver://localhost:1433;database=ci;user=sa;password=x;trustServerCertificate=true'

      - name: Typecheck
        run: pnpm typecheck

      # Non-mutating lint check — `pnpm lint` runs `eslint --fix`, which isn't
      # appropriate for CI (it would silently pass on issues autofixed away
      # from an uncommitted working tree). Fail the build on any violation.
      - name: Lint
        run: pnpm exec eslint "{src,libs,test,scripts}/**/*.ts" --max-warnings 0

      # `pnpm <script> -- <args>` on pnpm 11 forwards a literal `--` through to
      # the underlying command instead of stripping it, which makes jest treat
      # `--ci`/`--coverage` as positional test-path patterns ("No tests
      # found"). `pnpm exec jest` sidesteps the script-arg-forwarding step
      # entirely — confirmed by reproducing both ways in an isolated install.
      - name: Unit tests
        run: pnpm exec jest --ci --coverage

      # No live SQL Server needed: PrismaService is stubbed via
      # `overrideProvider` in test/app.e2e-spec.ts.
      - name: E2E tests
        run: pnpm exec jest --config ./test/jest-e2e.json --ci

      - name: Build
        run: pnpm build
